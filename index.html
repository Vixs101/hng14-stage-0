<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Card | Premium Interface</title>
  <meta name="description" content="A beautifully designed, accessible, and responsive task card component.">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="page-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <h1 style="text-align: center; margin-bottom: 20px;">Stage 0 Task Card</h1>
    <article class="todo-card" data-testid="test-todo-card">
      
      <header class="card-header">
        <div class="status-group">
          <span class="badge badge-priority" data-testid="test-todo-priority" aria-label="Priority: High">High Priority</span>
          <span class="badge badge-status" data-testid="test-todo-status" aria-label="Status: In Progress">In Progress</span>
        </div>
        <div class="actions-group">
          <button class="btn-icon" data-testid="test-todo-edit-button" aria-label="Edit task" title="Edit">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
          </button>
          <button class="btn-icon btn-danger" data-testid="test-todo-delete-button" aria-label="Delete task" title="Delete">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
          </button>
        </div>
      </header>

      <div class="card-body">
        <h2 class="todo-title" data-testid="test-todo-title">Date night!</h2>
        <p class="todo-description" data-testid="test-todo-description">
          Take my Girlfriend to the a private cinema, get some popcorn and watch a Micheal Jackson movie.
        </p>
        
        <!-- Tags -->
        <ul class="todo-tags" role="list" data-testid="test-todo-tags">
          <li class="tag tag-work" data-testid="test-todo-tag-work">Personal</li>
          <li class="tag tag-urgent" data-testid="test-todo-tag-urgent">Urgent</li>
          <li class="tag tag-devops">Date</li>
        </ul>
      </div>

      <footer class="card-footer">
        <div class="date-info">
          <div class="due-row">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-clock" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            <time data-testid="test-todo-due-date">Due Feb 18, 2026</time>
          </div>
          <time class="time-remaining" aria-live="polite" data-testid="test-todo-time-remaining">Due in 3 days</time>
        </div>
        
        <div class="toggle-container">
          <input type="checkbox" id="task-completed-toggle" class="visually-hidden toggle-input" data-testid="test-todo-complete-toggle">
          <label for="task-completed-toggle" class="toggle-label">
            <span class="custom-checkbox" aria-hidden="true">
               <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </span>
            <span class="toggle-text">Mark complete</span>
          </label>
        </div>
      </footer>
      
    </article>
  </main>

  <script src="script.js"></script>
</body>
</html>
